<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百世請款統計工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft JhengHei',system-ui,sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:14px;min-height:100vh}
.top{background:#1e40af;padding:0}
.top-title{padding:14px 20px 0;color:#fff}
.top-title h1{font-size:16px;font-weight:700}
.top-title p{font-size:12px;color:#93c5fd;margin-top:3px}
.mode-tabs{display:flex;margin-top:12px;padding:0 20px;gap:4px}
.mode-tab{padding:9px 24px;font-size:13px;font-weight:700;cursor:pointer;border-radius:8px 8px 0 0;border:none;background:rgba(255,255,255,.15);color:rgba(255,255,255,.7);transition:.15s;display:flex;align-items:center;gap:6px}
.mode-tab.active{background:#fff;color:#1e40af}
.mode-tab:hover:not(.active){background:rgba(255,255,255,.25);color:#fff}
.wrap{max-width:980px;margin:0 auto;padding:16px}
.panel{display:none}.panel.active{display:block}

/* Upload zone */
.upload-zone{border:2px dashed #d1d5db;border-radius:10px;padding:28px 20px;text-align:center;cursor:pointer;transition:.15s;position:relative;background:#fff;margin-bottom:12px}
.upload-zone:hover,.upload-zone.over{border-color:#3b82f6;background:#eff6ff}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone .icon{font-size:28px;margin-bottom:8px}
.upload-zone h3{font-size:14px;font-weight:600;margin-bottom:4px}
.upload-zone p{font-size:12px;color:#888}
.file-ok{display:inline-flex;align-items:center;gap:6px;background:#ecfdf5;border:1px solid #6ee7b7;color:#065f46;border-radius:20px;padding:4px 14px;font-size:12px;margin-top:8px}
.parse-msg{font-size:12px;color:#6b7280;margin-top:6px}

/* Filter card */
.filter-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px;margin-bottom:12px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.filter-row:last-child{margin-bottom:0}
.flabel{font-size:12px;color:#6b7280;font-weight:600;white-space:nowrap;min-width:72px}
input[type=text]{flex:1;min-width:160px;padding:8px 12px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;outline:none}
input[type=text]:focus{border-color:#3b82f6}
input[type=date]{padding:8px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;outline:none;color:#374151}
input[type=date]:focus{border-color:#3b82f6}
.sep{color:#bbb}
.btn{padding:8px 15px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:.12s;white-space:nowrap}
.btn-blue{background:#2563eb;color:#fff}.btn-blue:hover{background:#1d4ed8}
.btn-gray{background:#f3f4f6;color:#374151;border:1px solid #e5e7eb}.btn-gray:hover{background:#e5e7eb}
.btn-green{background:#10b981;color:#fff}.btn-green:hover{background:#059669}
.btn-amber{background:#f59e0b;color:#fff}.btn-amber:hover{background:#d97706}

/* Stats */
.stats-row{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:10px 16px;margin-bottom:12px;display:flex;gap:20px;flex-wrap:wrap;align-items:center}
.stat{font-size:12px;color:#6b7280}
.stat strong{color:#1e40af;font-size:15px;margin-right:3px}
.stat.money strong{color:#059669}

/* Trip cards */
.day-group{margin-bottom:4px}
.day-header{background:#f8fafc;border:1px solid #e5e7eb;border-radius:8px;padding:8px 14px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;color:#374151;cursor:pointer;user-select:none}
.day-header:hover{background:#f1f5f9}
.day-total{color:#059669;font-size:13px}
.day-count{color:#9ca3af;font-weight:400;margin-left:8px}
.trip-card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:6px;overflow:hidden}
.trip-head{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;user-select:none}
.trip-head:hover{background:#f9fafb}
.trip-date-badge{background:#dbeafe;color:#1e40af;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.trip-time{font-size:13px;font-weight:600;color:#374151;min-width:40px}
.trip-desc{font-size:13px;color:#4b5563;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trip-amt{font-size:15px;font-weight:700;color:#059669;white-space:nowrap}
.trip-amt.none{color:#d1d5db;font-size:12px}
.trip-body{display:none;border-top:1px solid #f3f4f6;padding:12px 14px;background:#fafafa}
.trip-card.open .trip-body{display:block}
.trip-raw{font-size:12px;color:#374151;white-space:pre-wrap;line-height:1.7;font-family:inherit}
.chevron{font-size:10px;color:#9ca3af;transition:.2s;flex-shrink:0}
.trip-card.open .chevron{transform:rotate(180deg)}

/* Order cards */
.order-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:10px;overflow:hidden}
.order-head{background:#1e3a8a;color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;gap:10px}
.order-num{font-size:15px;font-weight:700;letter-spacing:.04em}
.order-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.order-sdate{font-size:12px;background:rgba(255,255,255,.15);padding:2px 8px;border-radius:10px;color:#e0f2fe;font-weight:600}
.order-cnt{font-size:11px;color:#93c5fd}
.badge-priced{background:#fef08a;color:#713f12;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.chevron2{transition:.2s;font-size:11px}
.order-card.open .chevron2{transform:rotate(180deg)}
.order-body{display:none;padding:16px}
.order-card.open .order-body{display:block}
.detail-info{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px 14px;margin-bottom:14px}
.di-title{font-size:12px;font-weight:700;color:#166534;margin-bottom:8px}
.di-row{font-size:13px;color:#1a1a1a;padding:2px 0;line-height:1.6}
.mentions-title{font-size:12px;font-weight:700;color:#374151;margin-bottom:8px}
.mention{border-left:3px solid #3b82f6;padding:8px 12px;margin-bottom:8px;background:#f8fafc;border-radius:0 6px 6px 0}
.mention-label{font-size:11px;color:#6b7280;margin-bottom:4px;font-weight:600}
.msg-line{font-size:12px;padding:2px 0;color:#374151;line-height:1.5}
.msg-line.highlight{background:#fef9c3;border-radius:3px;padding:2px 6px;font-weight:600}
.msg-line.ctx{color:#9ca3af}

/* Note */
.note-area{margin-top:10px;display:flex;gap:8px;align-items:flex-start}
.note-area textarea{flex:1;padding:8px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:12px;resize:vertical;min-height:44px;font-family:inherit}
.note-area textarea:focus{border-color:#3b82f6;outline:none}
.save-btn{padding:6px 12px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:#10b981;color:#fff;white-space:nowrap}
.saved-note{font-size:11px;color:#059669;margin-top:5px}
.saved-note2{font-size:12px;color:#059669;background:#ecfdf5;border:1px solid #6ee7b7;border-radius:6px;padding:6px 10px;margin-top:6px}

.empty-hint{text-align:center;padding:40px;color:#9ca3af;background:#fff;border-radius:10px;border:1px dashed #e5e7eb}
.empty-hint .eicon{font-size:32px;margin-bottom:8px}
.hidden{display:none}
</style>
</head>
<body>
<div class="top">
  <div class="top-title">
    <h1>📦 百世請款統計工具</h1>
    <p>上傳聊天記錄 → 自動解析 → 篩選統計匯出</p>
  </div>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabTrip" onclick="switchMode('trip')">🚗 趟次模式（外群車單）</button>
    <button class="mode-tab" id="tabOrder" onclick="switchMode('order')">📦 行李單模式（百世訂單）</button>
  </div>
</div>

<div class="wrap">

<!-- ═══ TRIP PANEL ═══ -->
<div id="panelTrip" class="panel active">
  <div class="upload-zone" id="dropT">
    <input type="file" id="fileT" accept=".txt">
    <div class="icon">📂</div>
    <h3>上傳外群車單聊天記錄 (.txt)</h3>
    <p>LINE 匯出的 txt 檔，包含黃博瑋發的車趟資訊</p>
    <div id="fileOkT" class="file-ok hidden">✅ <span id="fileNameT"></span></div>
  </div>
  <div id="parseMsgT" class="parse-msg"></div>

  <div id="tripControls" class="hidden">
    <div class="filter-card">
      <div class="filter-row">
        <span class="flabel">🔍 搜尋</span>
        <input type="text" id="tSearch" placeholder="地點、金額、備註…" oninput="filterTrips()">
      </div>
      <div class="filter-row">
        <span class="flabel">📅 服務日期</span>
        <input type="date" id="tFrom" onchange="filterTrips()">
        <span class="sep">～</span>
        <input type="date" id="tTo" onchange="filterTrips()">
        <button class="btn btn-gray" onclick="clearTF()">清除</button>
      </div>
      <div class="filter-row">
        <button class="btn btn-gray" onclick="tExpandAll()">全部展開</button>
        <button class="btn btn-gray" onclick="tCollapseAll()">全部收合</button>
        <button class="btn btn-green" onclick="exportTrips()">⬇ 匯出 Excel</button>
        <button class="btn btn-amber" onclick="printTrips()">🖨 列印 PDF</button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat"><strong id="tTotal">0</strong>筆趟次</div>
      <div class="stat"><strong id="tShow">0</strong>筆顯示</div>
      <div class="stat money"><strong id="tSum">$0</strong>合計金額</div>
      <div class="stat money"><strong id="tNoteSum">$0</strong>核定金額</div>
    </div>
    <div id="tripList"></div>
  </div>
  <div id="tripEmpty" class="empty-hint">
    <div class="eicon">🚗</div>
    <div>請上傳外群車單的聊天記錄 txt 檔</div>
  </div>
</div>

<!-- ═══ ORDER PANEL ═══ -->
<div id="panelOrder" class="panel">
  <div class="upload-zone" id="dropO">
    <input type="file" id="fileO" accept=".txt">
    <div class="icon">📂</div>
    <h3>上傳百世訂單聊天記錄 (.txt)</h3>
    <p>LINE 匯出的 txt 檔，包含 LA 開頭的行李單號</p>
    <div id="fileOkO" class="file-ok hidden">✅ <span id="fileNameO"></span></div>
  </div>
  <div id="parseMsgO" class="parse-msg"></div>

  <div id="orderControls" class="hidden">
    <div class="filter-card">
      <div class="filter-row">
        <span class="flabel">🔍 搜尋</span>
        <input type="text" id="oSearch" placeholder="輸入單號或關鍵字…" oninput="filterOrders()">
      </div>
      <div class="filter-row">
        <span class="flabel">📅 接機日期</span>
        <input type="date" id="oFrom" onchange="filterOrders()">
        <span class="sep">～</span>
        <input type="date" id="oTo" onchange="filterOrders()">
        <button class="btn btn-gray" onclick="clearOF()">清除</button>
      </div>
      <div class="filter-row">
        <button class="btn btn-gray" onclick="oExpandAll()">全部展開</button>
        <button class="btn btn-gray" onclick="oCollapseAll()">全部收合</button>
        <button class="btn btn-green" onclick="exportOrders()">⬇ 匯出 Excel</button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat"><strong id="oTotal">0</strong>個單號</div>
      <div class="stat"><strong id="oShow">0</strong>個顯示中</div>
      <div class="stat"><strong id="oPriced">0</strong>個已批價</div>
    </div>
    <div id="orderList"></div>
  </div>
  <div id="orderEmpty" class="empty-hint">
    <div class="eicon">📦</div>
    <div>請上傳百世訂單的聊天記錄 txt 檔</div>
  </div>
</div>

</div>

<script>
// ══════════════════════════════════
// STATE
// ══════════════════════════════════
let TRIPS = [], ORDERS = [];
let filteredT = [], filteredO = [];
const tNotes = JSON.parse(localStorage.getItem('bsTrip2')||'{}');
const oNotes = JSON.parse(localStorage.getItem('bsOrder2')||'{}');

// ══════════════════════════════════
// MODE SWITCH
// ══════════════════════════════════
function switchMode(m) {
  document.getElementById('tabTrip').classList.toggle('active', m==='trip');
  document.getElementById('tabOrder').classList.toggle('active', m==='order');
  document.getElementById('panelTrip').classList.toggle('active', m==='trip');
  document.getElementById('panelOrder').classList.toggle('active', m==='order');
}

// ══════════════════════════════════
// UPLOAD - TRIP
// ══════════════════════════════════
const dropT = document.getElementById('dropT');
dropT.addEventListener('dragover', e=>{e.preventDefault();dropT.classList.add('over')});
dropT.addEventListener('dragleave', ()=>dropT.classList.remove('over'));
dropT.addEventListener('drop', e=>{e.preventDefault();dropT.classList.remove('over');handleTripFile(e.dataTransfer.files[0])});
document.getElementById('fileT').addEventListener('change', e=>handleTripFile(e.target.files[0]));

async function handleTripFile(file) {
  if(!file) return;
  document.getElementById('fileNameT').textContent = file.name;
  document.getElementById('fileOkT').classList.remove('hidden');
  setMsgT('解析中…');
  const text = await file.text();
  TRIPS = parseTrips(text);
  setMsgT(`✅ 解析完成，共找到 ${TRIPS.length} 筆趟次`);
  document.getElementById('tripControls').classList.remove('hidden');
  document.getElementById('tripEmpty').classList.add('hidden');
  document.getElementById('tTotal').textContent = TRIPS.length;
  filterTrips();
}
function setMsgT(t){document.getElementById('parseMsgT').textContent=t}

// ══════════════════════════════════
// UPLOAD - ORDER
// ══════════════════════════════════
const dropO = document.getElementById('dropO');
dropO.addEventListener('dragover', e=>{e.preventDefault();dropO.classList.add('over')});
dropO.addEventListener('dragleave', ()=>dropO.classList.remove('over'));
dropO.addEventListener('drop', e=>{e.preventDefault();dropO.classList.remove('over');handleOrderFile(e.dataTransfer.files[0])});
document.getElementById('fileO').addEventListener('change', e=>handleOrderFile(e.target.files[0]));

async function handleOrderFile(file) {
  if(!file) return;
  document.getElementById('fileNameO').textContent = file.name;
  document.getElementById('fileOkO').classList.remove('hidden');
  setMsgO('解析中…');
  const text = await file.text();
  ORDERS = parseOrders(text);
  setMsgO(`✅ 解析完成，共找到 ${ORDERS.length} 個單號`);
  document.getElementById('orderControls').classList.remove('hidden');
  document.getElementById('orderEmpty').classList.add('hidden');
  document.getElementById('oTotal').textContent = ORDERS.length;
  filterOrders();
}
function setMsgO(t){document.getElementById('parseMsgO').textContent=t}

// ══════════════════════════════════
// PARSER - TRIPS (外群車單)
// ══════════════════════════════════
function parseTrips(text) {
  const lines = text.split('\n');
  const chatDatePat = /^(\d{4})\.(\d{2})\.(\d{2})/;
  const msgPat = /^\d{2}:\d{2} .+/;
  const amtPat = /(?:[\$＄\(]|(?<![0-9]))(\d{3,5})(?:[\$元\)]|(?![0-9]))/g;

  let currentChatDate = null, currentYear = new Date().getFullYear();
  const lineDates = [];
  for(const line of lines){
    const m = chatDatePat.exec(line.trim());
    if(m){ currentChatDate=`${m[1]}-${m[2]}-${m[3]}`; currentYear=parseInt(m[1]); }
    lineDates.push([currentChatDate, currentYear]);
  }

  function extractAmt(txt){
    // Handle (7)(0)(0) style
    txt = txt.replace(/\((\d)\)/g,'$1').replace(/＄/g,'$');
    const found=[];
    let m;
    const re=/\$(\d{3,5})|(\d{3,5})\$|(?<![0-9/年月])(\d{3,5})(?=元|現|匯|$|[\s,，])/g;
    while((m=re.exec(txt))!==null){
      const v=parseInt(m[1]||m[2]||m[3]);
      if(v>=300&&v<=9999) found.push(v);
    }
    return found.length?found[0]:null;
  }

  function extractTripDate(txt, year){
    const m = txt.match(/(\d{1,2})[\/／](\d{1,2})/);
    if(m){
      const mo=parseInt(m[1]), dy=parseInt(m[2]);
      if(mo>=1&&mo<=12&&dy>=1&&dy<=31) return `${year}-${String(mo).padStart(2,'0')}-${String(dy).padStart(2,'0')}`;
    }
    return null;
  }

  function extractTime(txt){
    txt = txt.replace(/：/g,':');
    let m = txt.match(/\b(\d{2}):(\d{2})\b/);
    if(m) return `${m[1]}:${m[2]}`;
    m = txt.match(/\b([01]\d|2[0-3])([0-5]\d)\b/);
    if(m) return `${m[1]}:${m[2]}`;
    return '';
  }

  const trips = [];
  for(let i=0;i<lines.length;i++){
    const stripped = lines[i].trim();
    const [chatDate, chatYear] = lineDates[i];
    if(!msgPat.test(stripped)) continue;
    if(!stripped.includes('黃博瑋')) continue;
    if(stripped.includes('已收回')||stripped.includes('已新增')||stripped.includes('已加入')) continue;

    const blockLines = [stripped];
    let j=i+1;
    while(j<lines.length){
      const nl=lines[j].trim();
      if(msgPat.test(nl)||chatDatePat.test(nl)) break;
      if(nl) blockLines.push(nl);
      j++;
    }
    const full = blockLines.join(' ');
    const amount = extractAmt(full);
    const tripDate = extractTripDate(full, chatYear) || chatDate;
    const time = extractTime(full);
    const hasTrip = amount!==null || /送機|接機|送桃|接桃|桃機|松山機場|送機|接送/.test(full);
    if(hasTrip){
      trips.push({ date:tripDate||'', time, amount, raw:blockLines.join('\n') });
    }
  }
  return trips;
}

// ══════════════════════════════════
// PARSER - ORDERS (百世行李單)
// ══════════════════════════════════
function parseOrders(text) {
  const lines = text.split('\n');
  const chatDatePat = /^(\d{4})\.(\d{2})\.(\d{2})/;
  const msgPat = /^\d{2}:\d{2} .+/;
  const orderPat = /\b(LA[A-Z0-9]{5,10})\b/gi;
  const falsePosSet = new Set(['LABELLED','LANDING','LAKESHORE']);
  const pickupKws = ['接機資訊','取貨資訊','取件資訊','接送資訊','服務日期','Service Date'];

  // Tag lines with chat date
  let cur=null;
  const lineDates=lines.map(line=>{
    const m=chatDatePat.exec(line.trim());
    if(m) cur=`${m[1]}-${m[2]}-${m[3]}`;
    return cur;
  });

  function getDetailBlock(start){
    const block=[];
    let j=start+1;
    while(j<lines.length){
      const raw=lines[j].trim();
      if(msgPat.test(raw)||chatDatePat.test(raw)) break;
      if(raw) block.push(raw);
      j++;
    }
    return block;
  }

  function extractServiceDate(detailLines){
    const pats=[
      [/(\d{4})年(\d{1,2})月(\d{1,2})日/, m=>`${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`],
      [/(\d{4})\/(\d{1,2})\/(\d{1,2})/, m=>`${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`],
      [/(\d{2})\/(\d{2})\/(\d{4})/, m=>`${m[3]}-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`],
    ];
    for(let i=0;i<detailLines.length;i++){
      const isPickup=pickupKws.some(k=>detailLines[i].includes(k));
      const toSearch=isPickup?[detailLines[i],...(detailLines[i+1]?[detailLines[i+1]]:[])]:[];
      if(isPickup) for(const sl of toSearch) for(const [pat,fmt] of pats){const m=pat.exec(sl);if(m) return fmt(m);}
    }
    for(const line of detailLines) for(const [pat,fmt] of pats){const m=pat.exec(line);if(m) return fmt(m);}
    return null;
  }

  function getCtx(idx, window=3){
    const result=[];
    for(let j=Math.max(0,idx-window);j<Math.min(lines.length,idx+window+1);j++){
      const raw=lines[j].trim();
      if(raw&&!chatDatePat.test(raw)) result.push([raw, /LA[A-Z0-9]{5,10}/i.test(raw)]);
    }
    return result;
  }

  const orderData={};
  for(let i=0;i<lines.length;i++){
    const stripped=lines[i].trim();
    if(!orderPat.test(stripped)){ orderPat.lastIndex=0; continue; }
    orderPat.lastIndex=0;
    let m;
    while((m=orderPat.exec(stripped))!==null){
      const num=m[1].toUpperCase();
      if(falsePosSet.has(num)) continue;
      if(!num.endsWith('25')&&!num.endsWith('26')) continue;
      const detail=getDetailBlock(i);
      if(!orderData[num]) orderData[num]={chatDate:lineDates[i],detailBlock:null,serviceDate:null,mentions:[]};
      if(detail.length>(orderData[num].detailBlock||[]).length){
        orderData[num].detailBlock=detail;
        const sd=extractServiceDate(detail);
        if(sd) orderData[num].serviceDate=sd;
      }
      orderData[num].mentions.push([lineDates[i],i,stripped,detail]);
    }
    orderPat.lastIndex=0;
  }

  return Object.keys(orderData).sort().map(num=>{
    const info=orderData[num];
    const serviceDate=info.serviceDate||info.chatDate||'0000-00-00';
    const detail=info.detailBlock||[];

    let detailHtml='';
    if(detail.length){
      const rows=detail.map(l=>`<div class="di-row">${esc(l)}</div>`).join('');
      detailHtml=`<div class="detail-info"><div class="di-title">📋 服務資訊</div>${rows}</div>`;
    }

    const mentionParts=info.mentions.map(([date,li,msg,det],bi)=>{
      const ctx=getCtx(li);
      const ctxHtml=ctx.map(([t,hi])=>`<div class="msg-line ${num.toUpperCase()in t.toUpperCase()?'highlight':'ctx'}">${esc(t)}</div>`).join('');
      return `<div class="mention"><div class="mention-label">第${bi+1}次提及　${date||'日期不明'}</div>${ctxHtml}</div>`;
    }).join('');

    const bodyHtml=detailHtml+`<div class="mentions-title">💬 對話記錄</div>`+mentionParts+
      `<div class="note-area"><textarea id="note_${num}" placeholder="填寫批價金額或備註…" onchange="saveONote('${num}')">{SAVED}</textarea><button class="save-btn" onclick="saveONote('${num}')">儲存</button></div><div id="saved_${num}" class="saved-note2 hidden"></div>`;

    return { num, cnt:info.mentions.length, service_date:serviceDate, detail:detail.slice(0,6).join(' '), body:bodyHtml };
  }).sort((a,b)=>a.service_date.localeCompare(b.service_date));
}

function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ══════════════════════════════════
// TRIP RENDER
// ══════════════════════════════════
function filterTrips(){
  const q=document.getElementById('tSearch').value.trim().toLowerCase();
  const from=document.getElementById('tFrom').value;
  const to=document.getElementById('tTo').value;
  filteredT=TRIPS.filter(t=>{
    if(from&&t.date<from) return false;
    if(to&&t.date>to) return false;
    if(q&&!t.raw.toLowerCase().includes(q)) return false;
    return true;
  });
  renderTrips();
}
function clearTF(){ document.getElementById('tSearch').value=''; document.getElementById('tFrom').value=''; document.getElementById('tTo').value=''; filterTrips(); }

function tripKey(t){ return (t.date||'x')+'_'+(t.time||'x')+'_'+(t.amount||'0')+'_'+t.raw.substring(10,30).replace(/\s/g,''); }

function renderTrips(){
  const container=document.getElementById('tripList');
  container.innerHTML='';
  document.getElementById('tShow').textContent=filteredT.length;
  const rawSum=filteredT.reduce((s,t)=>s+(t.amount||0),0);
  const noteSum=filteredT.reduce((s,t)=>{
    const n=tNotes[tripKey(t)]; const v=n?parseInt(n.replace(/[^0-9]/g,'')):( t.amount||0);
    return s+(isNaN(v)?0:v);
  },0);
  document.getElementById('tSum').textContent='$'+rawSum.toLocaleString('zh-TW');
  document.getElementById('tNoteSum').textContent='$'+noteSum.toLocaleString('zh-TW');

  const byDate={};
  filteredT.forEach(t=>{ const d=t.date||'未知日期'; if(!byDate[d]) byDate[d]=[]; byDate[d].push(t); });
  Object.keys(byDate).sort().forEach(d=>{
    const dayTrips=byDate[d];
    const dayAmt=dayTrips.reduce((s,t)=>s+(t.amount||0),0);
    const group=document.createElement('div'); group.className='day-group';
    const weekday=d!=='未知日期'?['日','一','二','三','四','五','六'][new Date(d).getDay()]:'';
    const hdr=document.createElement('div'); hdr.className='day-header';
    hdr.innerHTML=`<span>📅 ${d}${weekday?' ('+weekday+')':''}<span class="day-count">${dayTrips.length} 筆</span></span><span class="day-total">${dayAmt?'$'+dayAmt.toLocaleString('zh-TW'):'(含無金額)'}</span>`;
    hdr.onclick=()=>{ const cards=group.querySelectorAll('.trip-card'); const anyOpen=[...cards].some(c=>c.classList.contains('open')); cards.forEach(c=>c.classList.toggle('open',!anyOpen)); };
    group.appendChild(hdr);
    dayTrips.forEach(t=>{
      const key=tripKey(t); const note=tNotes[key]||'';
      const desc=t.raw.replace(/^\d{2}:\d{2} 黃博瑋\s*/,'').replace(/\n/g,' ').substring(0,60);
      const card=document.createElement('div'); card.className='trip-card';
      card.innerHTML=`<div class="trip-head" onclick="toggleTrip(this.parentElement)">
        <span class="trip-date-badge">${t.date||'?'}</span>
        <span class="trip-time">${t.time||''}</span>
        <span class="trip-desc">${esc(desc)}</span>
        <span class="trip-amt${t.amount?'':' none'}">${t.amount?'$'+t.amount.toLocaleString('zh-TW'):'無金額'}</span>
        <span class="chevron">▼</span></div>
      <div class="trip-body">
        <div class="trip-raw">${esc(t.raw)}</div>
        <div class="note-area"><textarea id="tn_${key}" placeholder="核定金額或備註…" onchange="saveTNote('${key}')">${esc(note)}</textarea><button class="save-btn" onclick="saveTNote('${key}')">儲存</button></div>
        ${note?`<div class="saved-note">✓ 已記錄：${esc(note)}</div>`:''}
      </div>`;
      group.appendChild(card);
    });
    container.appendChild(group);
  });
}

function toggleTrip(card){ card.classList.toggle('open'); }
function tExpandAll(){ document.querySelectorAll('.trip-card').forEach(c=>c.classList.add('open')); }
function tCollapseAll(){ document.querySelectorAll('.trip-card').forEach(c=>c.classList.remove('open')); }
function saveTNote(key){
  const ta=document.getElementById('tn_'+key); if(!ta) return;
  tNotes[key]=ta.value; localStorage.setItem('bsTrip2',JSON.stringify(tNotes));
  const disp=ta.parentElement.nextElementSibling; if(disp){ disp.textContent=ta.value?'✓ 已記錄：'+ta.value:''; }
  const rawSum=filteredT.reduce((s,t)=>s+(t.amount||0),0);
  const noteSum=filteredT.reduce((s,t)=>{ const n=tNotes[tripKey(t)]; const v=n?parseInt(n.replace(/[^0-9]/g,'')):( t.amount||0); return s+(isNaN(v)?0:v); },0);
  document.getElementById('tNoteSum').textContent='$'+noteSum.toLocaleString('zh-TW');
}
function exportTrips(){
  const rows=[['服務日期','時間','金額','核定金額','原始內容']];
  filteredT.forEach(t=>{ const key=tripKey(t); rows.push([t.date,t.time,t.amount||'',tNotes[key]||'',t.raw]); });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  const wb={SheetNames:['趟次紀錄'],Sheets:{'趟次紀錄':ws}};
  const d=new Date(); const from=document.getElementById('tFrom').value,to=document.getElementById('tTo').value;
  const range=(from||to)?`_${from||''}-${to||''}`:'';
  XLSX.writeFile(wb,`外群趟次${range}_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.xlsx`);
}
function printTrips(){
  const totalAmt=filteredT.reduce((s,t)=>s+(t.amount||0),0);
  const from=document.getElementById('tFrom').value,to=document.getElementById('tTo').value;
  let html=`<html><head><meta charset="UTF-8"><style>body{font-family:'Microsoft JhengHei',Arial,sans-serif;font-size:11px;padding:20px}h1{font-size:16px;margin-bottom:4px}.sub{color:#888;font-size:10px;margin-bottom:16px}table{width:100%;border-collapse:collapse}th{background:#1e3a8a;color:#fff;padding:5px 8px;font-size:10px;text-align:left}td{padding:5px 8px;border-bottom:1px solid #e5e7eb;font-size:10px;vertical-align:top}.amt{text-align:right;font-weight:700;color:#065f46}.foot{background:#f0f9ff;font-weight:700}@media print{@page{margin:1cm}}</style></head><body><h1>🚗 外群趟次請款明細</h1><div class="sub">日期：${from||'全部'} ～ ${to||'全部'}　共 ${filteredT.length} 筆　合計 $${totalAmt.toLocaleString('zh-TW')} 元</div><table><thead><tr><th>服務日期</th><th>時間</th><th>金額</th><th>核定金額</th><th>內容摘要</th></tr></thead><tbody>`;
  filteredT.forEach(t=>{ const key=tripKey(t); const note=tNotes[key]||''; const desc=t.raw.replace(/^\d{2}:\d{2} 黃博瑋\s*/,'').replace(/\n/g,' ').substring(0,80); html+=`<tr><td>${t.date}</td><td>${t.time}</td><td class="amt">${t.amount?'$'+t.amount:''}</td><td class="amt">${note}</td><td>${esc(desc)}</td></tr>`; });
  html+=`<tr class="foot"><td colspan="2">合計</td><td class="amt">$${totalAmt.toLocaleString('zh-TW')}</td><td></td><td></td></tr></tbody></table></body></html>`;
  const w=window.open('','_blank'); w.document.write(html); w.document.close(); w.onload=()=>w.print();
}

// ══════════════════════════════════
// ORDER RENDER
// ══════════════════════════════════
function filterOrders(){
  const q=document.getElementById('oSearch').value.trim().toLowerCase();
  const from=document.getElementById('oFrom').value;
  const to=document.getElementById('oTo').value;
  filteredO=ORDERS.filter(o=>{
    if(q&&!o.num.toLowerCase().includes(q)&&!o.detail.toLowerCase().includes(q)) return false;
    if(from&&o.service_date<from) return false;
    if(to&&o.service_date>to) return false;
    return true;
  });
  renderOrders();
}
function clearOF(){ document.getElementById('oSearch').value=''; document.getElementById('oFrom').value=''; document.getElementById('oTo').value=''; filterOrders(); }

function renderOrders(){
  const container=document.getElementById('orderList');
  container.innerHTML='';
  document.getElementById('oShow').textContent=filteredO.length;
  document.getElementById('oPriced').textContent=ORDERS.filter(o=>oNotes[o.num]).length;
  filteredO.forEach(o=>{
    const savedNote=oNotes[o.num]||'';
    const body=o.body.replace('{SAVED}',esc(savedNote));
    const card=document.createElement('div'); card.className='order-card';
    card.innerHTML=`<div class="order-head" onclick="toggleOrder(this.parentElement)">
      <span class="order-num">${o.num}</span>
      <div class="order-meta">
        ${o.service_date&&o.service_date!=='0000-00-00'?`<span class="order-sdate">🗓 ${o.service_date}</span>`:''}
        <span class="order-cnt">${o.cnt} 則</span>
        ${savedNote?'<span class="badge-priced">✓ 已批價</span>':''}
        <span class="chevron2">▼</span>
      </div></div>
      <div class="order-body">${body}</div>`;
    container.appendChild(card);
    if(savedNote){ const d=card.querySelector('[id^="saved_"]'); if(d){d.textContent='已儲存：'+savedNote;d.classList.remove('hidden');} }
  });
}
function toggleOrder(card){ card.classList.toggle('open'); }
function oExpandAll(){ document.querySelectorAll('.order-card').forEach(c=>c.classList.add('open')); }
function oCollapseAll(){ document.querySelectorAll('.order-card').forEach(c=>c.classList.remove('open')); }
function saveONote(num){
  const ta=document.getElementById('note_'+num); if(!ta) return;
  oNotes[num]=ta.value; localStorage.setItem('bsOrder2',JSON.stringify(oNotes));
  const disp=document.getElementById('saved_'+num);
  if(disp){disp.textContent=ta.value?'已儲存：'+ta.value:'';disp.classList.toggle('hidden',!ta.value);}
  document.getElementById('oPriced').textContent=ORDERS.filter(o=>oNotes[o.num]).length;
  const card=ta.closest('.order-card');
  if(card){ const ex=card.querySelector('.badge-priced');
    if(ta.value&&!ex){const b=document.createElement('span');b.className='badge-priced';b.textContent='✓ 已批價';card.querySelector('.order-meta').insertBefore(b,card.querySelector('.chevron2'));}
    else if(!ta.value&&ex) ex.remove(); }
}
function exportOrders(){
  const rows=[['單號','接機/取貨日期','對話次數','服務摘要','批價金額/備註']];
  filteredO.forEach(o=>rows.push([o.num,o.service_date,o.cnt,o.detail,oNotes[o.num]||'']));
  const ws=XLSX.utils.aoa_to_sheet(rows);
  const wb={SheetNames:['行李單批價'],Sheets:{'行李單批價':ws}};
  const d=new Date(); const from=document.getElementById('oFrom').value,to=document.getElementById('oTo').value;
  const range=(from||to)?`_${from||''}-${to||''}`:'';
  XLSX.writeFile(wb,`百世行李單${range}_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.xlsx`);
}
